version: "3.9"

services:
  db:
    image: mysql:8.1
    container_name: event_booking_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: event_booking_api
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/schema:/docker-entrypoint-initdb.d  # initialize DB with schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-prootpassword"]
      interval: 10s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: ./src/Dockerfile
    container_name: event_booking_app
    restart: unless-stopped
    env_file:
      - .env  # loads DB_HOST, DB_USER, DB_PASSWORD, DB_NAME, DB_PORT, PORT
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data: