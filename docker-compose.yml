version: "3.9"

services:
  db:
    image: mysql:8.1
    container_name: event_booking_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: event_booking_api
      MYSQL_USER: appuser
      MYSQL_PASSWORD: apppassword
    ports:
      - "3307:3307"
    volumes:
      - db_data:/var/lib/mysql
      - ./src/schema:/docker-entrypoint-initdb.d

  app:
    build:
      context: .
      dockerfile: src/Dockerfile 
    container_name: event_booking_app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5000:5000"
    depends_on:
      - db
    command: ["node", "src/server.js"]   # optional override

volumes:
  db_data: